<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Finance Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <main class="container">
        <section class="hero">
            <h1>Smart Finance Dashboard</h1>
            <p>Analyze monthly income, spending, and financial health in seconds.</p>
        </section>

        <section class="card">
            <h2>Monthly Inputs</h2>
            <form id="finance-form">
                <div class="grid">
                    <label>Income (INR)
                        <input type="number" min="0" step="100" id="income" required>
                    </label>
                    <label>Rent
                        <input type="number" min="0" step="100" id="rent" required>
                    </label>
                    <label>Food
                        <input type="number" min="0" step="100" id="food" required>
                    </label>
                    <label>Transport
                        <input type="number" min="0" step="100" id="transport" required>
                    </label>
                    <label>Subscriptions
                        <input type="number" min="0" step="100" id="subscriptions" required>
                    </label>
                    <label>Shopping
                        <input type="number" min="0" step="100" id="shopping" required>
                    </label>
                    <label>Others
                        <input type="number" min="0" step="100" id="others" required>
                    </label>
                </div>
                <button type="submit">Analyze Finances</button>
            </form>
            <p id="error" class="error"></p>
        </section>

        <section id="results" class="card hidden">
            <div class="summary">
                <div>
                    <p class="label">Income</p>
                    <p id="incomeOut" class="value"></p>
                </div>
                <div>
                    <p class="label">Expenses</p>
                    <p id="expensesOut" class="value"></p>
                </div>
                <div>
                    <p class="label">Savings</p>
                    <p id="savingsOut" class="value"></p>
                </div>
                <div>
                    <p class="label">Savings Rate</p>
                    <p id="savingsRateOut" class="value"></p>
                </div>
            </div>

            <div class="score-row">
                <h2>Financial Health</h2>
                <span id="scoreBadge" class="badge">0 / 100</span>
            </div>
            <p id="statusOut" class="status"></p>

            <div class="chart-wrap">
                <canvas id="expenseChart"></canvas>
            </div>

            <h3>Recommendations</h3>
            <ul id="suggestions"></ul>
        </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
